name: build-windows-exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: |
          cd client/mobile-app
          npm install

      - name: Ensure Tauri CLI
        run: |
          cd client/mobile-app
          npm install -D @tauri-apps/cli

      - name: Build Windows EXE
        run: |
          cd client/mobile-app
          npm run tauri:build
        env:
          VITE_BARIBUDOS_API: http://127.0.0.1:8787/api

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baribudos-windows-exe
          path: |
            client/mobile-app/src-tauri/target/release/*.exe
            client/mobile-app/src-tauri/target/release/bundle/nsis/*.exe
