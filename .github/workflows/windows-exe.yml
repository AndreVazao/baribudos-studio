name: Windows EXE Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'client/mobile-app/**'
      - '.github/workflows/windows-exe.yml'

jobs:
  build-windows-exe:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: client/mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/mobile-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          VITE_BARIBUDOS_API: http://127.0.0.1:8787/api

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baribudos-windows-exe
          path: |
            client/mobile-app/src-tauri/target/release/*.exe
            client/mobile-app/src-tauri/target/release/bundle/nsis/*.exe
