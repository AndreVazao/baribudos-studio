name: Build Baribudos Studio

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller main.py --onefile --noconsole --name BaribudosStudio

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaribudosStudio-windows
          path: dist/BaribudosStudio.exe

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer init || true
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaribudosStudio-android
          path: bin/*.apk
