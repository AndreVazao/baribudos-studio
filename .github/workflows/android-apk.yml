name: Android APK Build

on:
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd client/mobile-app
          npm install

      - name: Build web app
        run: |
          cd client/mobile-app
          npm run build

      - name: Install Capacitor Android
        run: |
          cd client/mobile-app
          npx cap add android || true
          npx cap sync android

      - name: Build APK
        run: |
          cd client/mobile-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: baribudos-apk
          path: client/mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
