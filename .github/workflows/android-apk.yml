name: build-android-apk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies (root)
        run: npm install

      - name: Install mobile deps
        run: |
          cd client/mobile-app
          npm install
          npm install -D typescript

      - name: Build web app
        run: |
          cd client/mobile-app
          npm run build

      - name: Install Capacitor Android
        run: |
          cd client/mobile-app
          npx cap add android
          npx cap sync

      - name: Build APK
        run: |
          cd client/mobile-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: baribudos-mobile-apk
          path: client/mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
